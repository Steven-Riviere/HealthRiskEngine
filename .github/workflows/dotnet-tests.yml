name: .NET

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

    
jobs:
    build-test-package:
        runs-on: ubuntu-latest

        services:
          mongo:
            image: mongo:7
            ports:
              - 27017:27017
            options: >-
              --health-cmd="mongosh --eval 'db.runCommand({ ping: 1 })'"
              --health-interval=10s
              --health-timeout=5s
              --health-retries=5

        env:
          MONGO_CONNECTION: mongodb://mongo:27017
          
        steps:
            - uses: actions/checkout@v4
            
            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: 8.0.x

            - name: Restore dependencies
              run: dotnet restore HealthRiskEngine.sln

            - name: Build
              run: dotnet build HealthRiskEngine.sln --no-restore

            - name: Test
              run: dotnet test HealthRiskEngine.sln --no-build --verbosity normal