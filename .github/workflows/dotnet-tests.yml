name: .NET

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      MONGO_CONNECTION: mongodb://localhost:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 🔥 attendre que Mongo soit prêt
      - name: Wait for MongoDB
        run: |
          for i in {1..10}; do
            nc -z localhost 27017 && echo "Mongo is up!" && exit 0
            echo "Waiting for Mongo..."
            sleep 3
          done
          echo "Mongo did not start in time" && exit 1

      - name: Restore
        run: dotnet restore HealthRiskEngine.sln

      - name: Build
        run: dotnet build HealthRiskEngine.sln --no-restore

      - name: Test
        run: dotnet test HealthRiskEngine.sln --no-build --verbosity normal