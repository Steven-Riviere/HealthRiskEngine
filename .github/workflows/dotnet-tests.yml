name: .NET

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

    
jobs:
    build-test-package:
        runs-on: windows-latest

        steps:
            - uses: actions/checkout@v4
            
            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: 8.0.x

            - name: Restore dependencies
              run: dotnet restore HealthRiskEngine/HealthRiskEngine.sln

            - name: Build
              run: dotnet build HealthRiskEngine/HealthRiskEngine.sln --no-restore

            - name: Test
              run: dotnet test HealthRiskEngine/HealthRiskEngine.sln --no-build --verbosity normal